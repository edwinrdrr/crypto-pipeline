version: 2

models:
  - name: fct_crypto_prices
    description: "Time-series of crypto price snapshots with per-coin change vs the previous poll."
    columns:
      - name: coin
        description: "CoinGecko coin id (e.g. bitcoin)."
        tests:
          - not_null
      - name: price_usd
        description: "Spot price in USD at ingest time."
        tests:
          - not_null
      - name: ingested_at
        description: "When our pipeline pulled this snapshot (partition key)."
        tests:
          - not_null
      - name: price_change_pct_since_prev
        description: "Percent change in price vs the previous snapshot for this coin."
    # No duplicate coin+timestamp rows should exist after the merge.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - coin
            - ingested_at

  - name: mart_latest_prices
    description: "Latest snapshot per coin — for dashboard scorecards/tables (one row per coin)."
    columns:
      - name: coin
        description: "CoinGecko coin id; exactly one row per coin here."
        tests:
          - not_null
          - unique
      - name: price_usd
        description: "Most recent spot price in USD."
        tests:
          - not_null
      - name: last_updated
        description: "ingested_at of the latest snapshot for this coin."
