version: 2

sources:
  - name: crypto_raw
    # Level-3 isolation: the project IS the env, so dataset name is the same
    # everywhere (`crypto_raw`). The PROJECT differs per target via target.project.
    database: "{{ target.project }}"
    schema: crypto_raw
    tables:
      - name: prices
        description: "Raw CoinGecko price snapshots, one row per coin per 5-min poll."
        loaded_at_field: ingested_at
        freshness:
          warn_after: { count: 15, period: minute }
          error_after: { count: 60, period: minute }
        columns:
          - name: coin
            tests: [not_null]
          - name: price_usd
          - name: ingested_at
            tests: [not_null]
