# dbt profile — one target per environment. Each environment is its own GCP
# PROJECT (Level-3 isolation). Datasets inside a project drop the env suffix:
# `crypto_raw` + `crypto_analytics` — the project IS the env.
#
# Auth is env-driven:
#   - Local (laptop): DBT_METHOD=oauth, GCP_PROJECT_DEV from .env → dev project.
#   - CI: google-github-actions/auth provides ADC via Workload Identity Federation.
#       dbt uses method=oauth (reads ADC); no key files anywhere.

crypto:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: bigquery
      method:   "{{ env_var('DBT_METHOD', 'oauth') }}"
      project:  "{{ env_var('GCP_PROJECT_DEV') }}"
      dataset:  "{{ env_var('DBT_DATASET', 'crypto_analytics') }}"
      location: US
      threads:  4
      priority: interactive

    staging:
      type: bigquery
      method:   "{{ env_var('DBT_METHOD', 'oauth') }}"
      project:  "{{ env_var('GCP_PROJECT_STAGING') }}"
      dataset:  crypto_analytics
      location: US
      threads:  4
      priority: interactive

    prod:
      type: bigquery
      method:   "{{ env_var('DBT_METHOD', 'oauth') }}"
      project:  "{{ env_var('GCP_PROJECT_PROD') }}"
      dataset:  crypto_analytics
      location: US
      threads:  4
      priority: interactive
