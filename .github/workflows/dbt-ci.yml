name: dbt CI/CD

# Environment-isolated CI/CD:
#   Pull request  -> build into an EPHEMERAL per-PR schema (dbt_ci_pr_<n>), then DROP it.
#   Merge to main -> build STAGING, and only if that passes, promote to PROD.
#
# Required GitHub repo secrets:
#   GCP_PROJECT   your project id
#   GCP_SA_KEY    JSON key of a service account with BigQuery access (+ dataset delete
#                 for the ephemeral cleanup). For production prefer Workload Identity Federation.

on:
  pull_request:
    paths: ["dbt/**", ".github/workflows/dbt-ci.yml"]
  push:
    branches: [main]
    paths: ["dbt/**", ".github/workflows/dbt-ci.yml"]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
  GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa-key.json
  DBT_METHOD: service-account

jobs:
  # ── PR: isolated build in a throwaway schema, dropped afterwards ───────────
  pr-ephemeral:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_TARGET: dev
      RAW_DATASET: crypto_raw_dev
      DBT_DATASET: dbt_ci_pr_${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.* google-cloud-bigquery
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
      - run: dbt deps
      - name: dbt build into ephemeral schema (${{ env.DBT_DATASET }})
        run: dbt build --target dev
      - name: Drop ephemeral schema
        if: always()        # clean up even if the build failed
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import os
          from google.cloud import bigquery
          client = bigquery.Client(project=os.environ["GCP_PROJECT"])
          ds = f"{os.environ['GCP_PROJECT']}.{os.environ['DBT_DATASET']}"
          client.delete_dataset(ds, delete_contents=True, not_found_ok=True)
          print("dropped", ds)
          PY

  # ── merge to main, step 1: build + test STAGING ───────────────────────────
  staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_TARGET: staging
      RAW_DATASET: crypto_raw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.*
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
      - run: dbt deps
      - name: dbt build (staging)
        run: dbt build --target staging

  # ── merge to main, step 2: promote to PROD (only if staging passed) ────────
  prod:
    if: github.event_name == 'push'
    needs: staging        # the promotion gate: prod runs only after staging is green
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_TARGET: prod
      RAW_DATASET: crypto_raw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.*
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
      - run: dbt deps
      - name: dbt build (prod)
        run: dbt build --target prod
