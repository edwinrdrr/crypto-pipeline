name: dbt CI/CD

# Environment-isolated CI/CD with SLIM CI:
#   Pull request  -> build only CHANGED models (state:modified+ vs the prod manifest),
#                    into an EPHEMERAL per-PR schema (dbt_ci_pr_<n>), then DROP it.
#   Merge to main -> build STAGING, then PROD; PROD uploads its manifest.json to GCS
#                    so the next PR knows what "changed" means.
#
# Required GitHub repo secrets: GCP_PROJECT, GCP_SA_KEY.

on:
  pull_request:
    paths: ["dbt/**", ".github/workflows/dbt-ci.yml"]
  push:
    branches: [main]
    paths: ["dbt/**", ".github/workflows/dbt-ci.yml"]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  BUCKET: ${{ secrets.GCP_PROJECT }}-crypto-raw
  DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
  GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa-key.json
  DBT_METHOD: service-account
  STATE_OBJECT: dbt-state/manifest.json     # the prod manifest, stored in GCS

jobs:
  # ── PR: Slim CI — build only changed models, in a throwaway schema, then drop ──
  pr-ephemeral:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_TARGET: dev
      RAW_DATASET: crypto_raw_dev
      DBT_DATASET: dbt_ci_pr_${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.* google-cloud-bigquery google-cloud-storage
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
      - run: dbt deps

      - name: Fetch prod manifest (Slim CI state)
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import os
          from google.cloud import storage
          c = storage.Client(project=os.environ["GCP_PROJECT"])
          blob = c.bucket(os.environ["BUCKET"]).blob(os.environ["STATE_OBJECT"])
          if blob.exists():
              os.makedirs("prod-state", exist_ok=True)
              blob.download_to_filename("prod-state/manifest.json")
              print("state manifest downloaded")
          else:
              print("no prior manifest — will full-build")
          PY

      - name: dbt build (Slim CI — only changed models)
        run: |
          if [ -f "$GITHUB_WORKSPACE/prod-state/manifest.json" ]; then
            echo "::notice::Slim CI — building state:modified.body+ (unchanged models deferred to prod)"
            # .body compares the SQL only. Plain state:modified also compares the target
            # relation (schema), which differs here (prod crypto_analytics vs ephemeral
            # dbt_ci_pr_<n>) and would flag EVERY model as modified — defeating Slim CI.
            dbt build --select state:modified.body+ --defer --state "$GITHUB_WORKSPACE/prod-state" --target dev
          else
            echo "::notice::No prior manifest — full build (first run)"
            dbt build --target dev
          fi

      - name: Drop ephemeral schema
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import os
          from google.cloud import bigquery
          client = bigquery.Client(project=os.environ["GCP_PROJECT"])
          ds = f"{os.environ['GCP_PROJECT']}.{os.environ['DBT_DATASET']}"
          client.delete_dataset(ds, delete_contents=True, not_found_ok=True)
          print("dropped", ds)
          PY

  # ── merge to main, step 1: build + test STAGING ───────────────────────────
  staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_TARGET: staging
      RAW_DATASET: crypto_raw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.*
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
      - run: dbt deps
      - name: dbt build (staging)
        run: dbt build --target staging

  # ── merge to main, step 2: promote to PROD, then publish its manifest ──────
  prod:
    if: github.event_name == 'push'
    needs: staging        # the promotion gate: prod runs only after staging is green
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_TARGET: prod
      RAW_DATASET: crypto_raw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.* google-cloud-storage
      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
      - run: dbt deps
      - name: dbt build (prod)
        run: dbt build --target prod
      - name: Publish prod manifest (becomes next PR's Slim CI baseline)
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import os
          from google.cloud import storage
          c = storage.Client(project=os.environ["GCP_PROJECT"])
          c.bucket(os.environ["BUCKET"]).blob(os.environ["STATE_OBJECT"]) \
           .upload_from_filename("dbt/target/manifest.json")
          print("published prod manifest to gs://%s/%s" % (os.environ["BUCKET"], os.environ["STATE_OBJECT"]))
          PY
