name: scheduled dbt (prod refresh)

# Free 24/7 prod transform via GitHub Actions cron — the gap that the every-5-min
# Cloud Scheduler (ingestion only) doesn't cover.
#
# Keyless auth via Workload Identity Federation (no SA keys).
#
# Public repo: unlimited Action minutes (no 2,000/mo cap). Schedule kept modest
# anyway — every 6h is plenty for crypto analytics.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  WIF_PROVIDER: projects/101866768306/locations/global/workloadIdentityPools/github-actions/providers/github
  DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
  DBT_METHOD: oauth
  DBT_TARGET: prod

jobs:
  refresh-prod:
    runs-on: ubuntu-latest
    environment: production           # same gate as the prod job in dbt-ci.yml
    defaults:
      run:
        working-directory: dbt
    env:
      GCP_PROJECT_PROD: ${{ secrets.GCP_PROJECT_PROD }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: dbt-ci@${{ secrets.GCP_PROJECT_PROD }}.iam.gserviceaccount.com
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.*
      - run: dbt deps
      - name: dbt build (prod refresh)
        run: dbt build --target prod
